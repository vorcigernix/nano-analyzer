name: nano-analyzer
description: LLM-powered vulnerability scanning with triage-validated CI failure policy.
branding:
  icon: bell
  color: yellow

inputs:
  target:
    description: Path or newline-separated paths to scan.
    required: false
    default: "."
  model:
    description: Model for context, scan, and triage stages.
    required: false
    default: gpt-5.4-nano
  provider:
    description: Provider selection, one of auto, openai, openrouter.
    required: false
    default: auto
  install-mode:
    description: Installation mode, one of auto, binary, source. Auto downloads a release binary when available and falls back to source build.
    required: false
    default: auto
  binary-version:
    description: GitHub release tag to download. Empty uses the current action tag, or the latest release when the action is used from a branch.
    required: false
    default: ""
  output-dir:
    description: Output directory. Defaults to a runner temp directory.
    required: false
    default: ""
  format:
    description: Comma-separated outputs, such as json,markdown,sarif.
    required: false
    default: json,markdown,sarif
  scope:
    description: Scan scope, one of changed or all.
    required: false
    default: changed
  parallel:
    description: Maximum concurrent file scans.
    required: false
    default: "50"
  max-connections:
    description: Maximum total concurrent API calls. Empty uses parallel + triage-parallel.
    required: false
    default: ""
  max-chars:
    description: Skip files larger than this many bytes/chars.
    required: false
    default: "200000"
  triage:
    description: Triage mode, one of enabled or disabled.
    required: false
    default: enabled
  triage-threshold:
    description: Triage findings at or above this severity.
    required: false
    default: medium
  triage-rounds:
    description: Triage rounds per finding.
    required: false
    default: "5"
  triage-parallel:
    description: Maximum concurrent triage findings.
    required: false
    default: "50"
  min-confidence:
    description: Minimum confidence for survivor reporting.
    required: false
    default: "0"
  fail-mode:
    description: Failure mode, one of validated, raw, never.
    required: false
    default: validated
  fail-on:
    description: Fail on findings at or above this severity.
    required: false
    default: high
  fail-confidence:
    description: Minimum validated confidence required to fail.
    required: false
    default: "0.7"
  project:
    description: Project name used in triage prompts.
    required: false
    default: ""
  repo-dir:
    description: Repository root for grep and changed-file lookups.
    required: false
    default: "."
  upload-artifact:
    description: Upload full analyzer output as a workflow artifact. Skipped only when the PR comment fallback posts successfully.
    required: false
    default: "true"
  upload-sarif:
    description: Upload results.sarif to GitHub code scanning.
    required: false
    default: "true"
  pr-comment:
    description: PR comment mode, one of fallback, always, false. Fallback comments only when SARIF upload is unavailable.
    required: false
    default: fallback

outputs:
  output-dir:
    description: Directory containing analyzer output.
    value: ${{ steps.scan.outputs['output-dir'] }}
  exit-code:
    description: nano-analyzer exit code.
    value: ${{ steps.scan.outputs['exit-code'] }}
  sarif-file:
    description: SARIF output path when generated.
    value: ${{ steps.scan.outputs['sarif-file'] }}
  pr-comment-file:
    description: Markdown file used for PR comment fallback when generated.
    value: ${{ steps.scan.outputs['pr-comment-file'] }}

runs:
  using: composite
  steps:
    - name: Install nano-analyzer
      id: install
      shell: bash
      env:
        INPUT_INSTALL_MODE: ${{ inputs.install-mode }}
        INPUT_BINARY_VERSION: ${{ inputs.binary-version }}
        ACTION_REPOSITORY: ${{ github.action_repository }}
        ACTION_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        mkdir -p "$RUNNER_TEMP/nano-analyzer-bin"

        mode="$(printf '%s' "$INPUT_INSTALL_MODE" | tr '[:upper:]' '[:lower:]')"
        case "$mode" in
          auto|binary|source) ;;
          *) echo "unsupported install-mode: $INPUT_INSTALL_MODE" >&2; exit 2 ;;
        esac

        ext=""
        os="$(printf '%s' "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')"
        arch="$(uname -m)"
        case "$arch" in
          x86_64|amd64) arch="amd64" ;;
          arm64|aarch64) arch="arm64" ;;
          *) arch="" ;;
        esac
        case "$os" in
          linux|macos) ;;
          windows) os="windows"; ext=".exe" ;;
          *) os="" ;;
        esac
        [[ "$os" == "macos" ]] && os="darwin"

        bin="$RUNNER_TEMP/nano-analyzer-bin/nano-analyzer$ext"
        echo "binary=$bin" >> "$GITHUB_OUTPUT"

        if [[ "$mode" == "source" || -z "$os" || -z "$arch" ]]; then
          echo "source-build=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        action_repo="${ACTION_REPOSITORY:-vorcigernix/nano-analyzer}"
        asset="nano-analyzer-${os}-${arch}${ext}"
        version="$INPUT_BINARY_VERSION"
        if [[ -z "$version" && "$ACTION_REF" == v* ]]; then
          version="$ACTION_REF"
        fi

        if [[ -n "$version" ]]; then
          url="https://github.com/${action_repo}/releases/download/${version}/${asset}"
        else
          url="https://github.com/${action_repo}/releases/latest/download/${asset}"
        fi

        if curl -fsSL "$url" -o "$bin"; then
          chmod +x "$bin"
          echo "Installed nano-analyzer binary from $url"
          echo "source-build=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ "$mode" == "binary" ]]; then
          echo "Failed to download nano-analyzer binary from $url" >&2
          exit 1
        fi

        echo "No release binary found for ${os}/${arch}; building from source."
        echo "source-build=true" >> "$GITHUB_OUTPUT"

    - name: Set up Go
      if: ${{ steps.install.outputs['source-build'] == 'true' }}
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ github.action_path }}/go.mod
        cache: false

    - name: Build nano-analyzer
      if: ${{ steps.install.outputs['source-build'] == 'true' }}
      shell: bash
      env:
        NANO_ANALYZER_BINARY: ${{ steps.install.outputs.binary }}
      run: |
        set -euo pipefail
        cd "$GITHUB_ACTION_PATH"
        go build -o "$NANO_ANALYZER_BINARY" ./cmd/nano-analyzer

    - name: Run nano-analyzer
      id: scan
      shell: bash
      env:
        NANO_ANALYZER_BINARY: ${{ steps.install.outputs.binary }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_OUTPUT_DIR: ${{ inputs.output-dir }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_SCOPE: ${{ inputs.scope }}
        INPUT_PARALLEL: ${{ inputs.parallel }}
        INPUT_MAX_CONNECTIONS: ${{ inputs.max-connections }}
        INPUT_MAX_CHARS: ${{ inputs.max-chars }}
        INPUT_TRIAGE: ${{ inputs.triage }}
        INPUT_TRIAGE_THRESHOLD: ${{ inputs.triage-threshold }}
        INPUT_TRIAGE_ROUNDS: ${{ inputs.triage-rounds }}
        INPUT_TRIAGE_PARALLEL: ${{ inputs.triage-parallel }}
        INPUT_MIN_CONFIDENCE: ${{ inputs.min-confidence }}
        INPUT_FAIL_MODE: ${{ inputs.fail-mode }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_FAIL_CONFIDENCE: ${{ inputs.fail-confidence }}
        INPUT_REPO_DIR: ${{ inputs.repo-dir }}
        INPUT_PROJECT: ${{ inputs.project }}
      run: |
        set -euo pipefail
        out="$INPUT_OUTPUT_DIR"
        if [[ -z "$out" ]]; then
          out="$RUNNER_TEMP/nano-analyzer-results"
        fi

        cmd=(
          "$NANO_ANALYZER_BINARY" scan
          --model "$INPUT_MODEL"
          --provider "$INPUT_PROVIDER"
          --output-dir "$out"
          --format "$INPUT_FORMAT"
          --scope "$INPUT_SCOPE"
          --parallel "$INPUT_PARALLEL"
          --max-chars "$INPUT_MAX_CHARS"
          --triage "$INPUT_TRIAGE"
          --triage-threshold "$INPUT_TRIAGE_THRESHOLD"
          --triage-rounds "$INPUT_TRIAGE_ROUNDS"
          --triage-parallel "$INPUT_TRIAGE_PARALLEL"
          --min-confidence "$INPUT_MIN_CONFIDENCE"
          --fail-mode "$INPUT_FAIL_MODE"
          --fail-on "$INPUT_FAIL_ON"
          --fail-confidence "$INPUT_FAIL_CONFIDENCE"
          --repo-dir "$INPUT_REPO_DIR"
        )
        if [[ -n "$INPUT_MAX_CONNECTIONS" ]]; then
          cmd+=(--max-connections "$INPUT_MAX_CONNECTIONS")
        fi
        if [[ -n "$INPUT_PROJECT" ]]; then
          cmd+=(--project "$INPUT_PROJECT")
        fi
        while IFS= read -r target; do
          [[ -n "$target" ]] && cmd+=("$target")
        done <<< "$INPUT_TARGET"

        set +e
        "${cmd[@]}"
        status=$?
        set -e
        echo "output-dir=$out" >> "$GITHUB_OUTPUT"
        echo "exit-code=$status" >> "$GITHUB_OUTPUT"
        echo "sarif-file=$out/results.sarif" >> "$GITHUB_OUTPUT"
        echo "pr-comment-file=$out/pr-comment.md" >> "$GITHUB_OUTPUT"
        if [[ -f "$out/results.sarif" ]]; then
          echo "sarif-exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "sarif-exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Check SARIF upload availability
      id: sarif_upload
      if: ${{ always() && inputs.upload-sarif == 'true' && steps.scan.outputs['sarif-exists'] == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        body="$RUNNER_TEMP/nano-analyzer-code-scanning-check.json"
        if ! status="$(
          curl -sS -L -o "$body" -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/code-scanning/alerts?per_page=1"
        )"; then
          status="000"
        fi

        if [[ "$status" == "200" ]]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "Code scanning is available; SARIF upload will run."
          exit 0
        fi

        message=""
        if [[ -s "$body" ]] && command -v jq >/dev/null 2>&1; then
          message="$(jq -r '.message // empty' "$body" 2>/dev/null || true)"
        fi
        if [[ -z "$message" && -s "$body" ]]; then
          message="$(tr '\n' ' ' < "$body" | sed 's/[[:space:]]\+/ /g' | cut -c1-300)"
        fi
        if [[ -z "$message" ]]; then
          message="code scanning availability check failed"
        fi

        echo "available=false" >> "$GITHUB_OUTPUT"
        echo "SARIF upload skipped because GitHub code scanning is not available for ${GITHUB_REPOSITORY}: HTTP $status ${message}"

    - name: Upload SARIF
      if: ${{ always() && inputs.upload-sarif == 'true' && steps.scan.outputs['sarif-exists'] == 'true' && steps.sarif_upload.outputs.available == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.scan.outputs['sarif-file'] }}

    - name: Comment PR with analyzer results
      id: pr_comment
      if: ${{ always() && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && (inputs.pr-comment == 'always' || (inputs.pr-comment != 'false' && steps.sarif_upload.outputs.available == 'false')) }}
      uses: actions/github-script@v7
      env:
        NANO_ANALYZER_OUTPUT_DIR: ${{ steps.scan.outputs['output-dir'] }}
        NANO_ANALYZER_COMMENT_FILE: ${{ steps.scan.outputs['pr-comment-file'] }}
        NANO_ANALYZER_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        NANO_ANALYZER_SARIF_AVAILABLE: ${{ steps.sarif_upload.outputs.available }}
      with:
        github-token: ${{ github.token }}
        result-encoding: string
        script: |
          const fs = require('fs');
          const path = require('path');

          const marker = '<!-- nano-analyzer-pr-comment -->';
          const outputDir = process.env.NANO_ANALYZER_OUTPUT_DIR || '';
          const candidates = [
            process.env.NANO_ANALYZER_COMMENT_FILE,
            outputDir ? path.join(outputDir, 'summary.md') : '',
          ].filter(Boolean);

          let body = '';
          for (const candidate of candidates) {
            if (fs.existsSync(candidate)) {
              body = fs.readFileSync(candidate, 'utf8');
              break;
            }
          }
          if (!body.trim()) {
            body = '## nano-analyzer security audit\n\nNo analyzer output file was produced.';
          }

          const sarifAvailable = process.env.NANO_ANALYZER_SARIF_AVAILABLE;
          let notice = '_SARIF upload did not run, so nano-analyzer posted results here._';
          if (sarifAvailable === 'true') {
            notice = '_SARIF was uploaded to GitHub code scanning; this comment mirrors the PR audit summary._';
          } else if (sarifAvailable === 'false') {
            notice = '_GitHub code scanning is unavailable for this repository, so nano-analyzer posted results here instead of uploading SARIF._';
          }
          let commentBody = `${marker}\n${body.trim()}\n\n${notice}\n\n[Workflow run](${process.env.NANO_ANALYZER_RUN_URL})`;
          const maxLength = 60000;
          if (commentBody.length > maxLength) {
            commentBody = `${commentBody.slice(0, maxLength - 80).trim()}\n\n_[comment truncated; see the workflow run for full logs]_`;
          }

          try {
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody,
              });
            }
          } catch (error) {
            core.warning(`Unable to post nano-analyzer PR comment: ${error.message}`);
            return 'failed';
          }
          return 'posted';

    - name: Upload nano-analyzer artifact
      if: ${{ always() && inputs.upload-artifact == 'true' && (steps.sarif_upload.outputs.available != 'false' || inputs.pr-comment == 'false' || steps.pr_comment.outputs.result != 'posted' || (github.event_name != 'pull_request' && github.event_name != 'pull_request_target')) }}
      uses: actions/upload-artifact@v4
      with:
        name: nano-analyzer-results
        path: ${{ steps.scan.outputs['output-dir'] }}
        if-no-files-found: ignore

    - name: Fail on analyzer policy
      if: ${{ steps.scan.outputs['exit-code'] != '0' }}
      shell: bash
      run: exit "${{ steps.scan.outputs['exit-code'] }}"
